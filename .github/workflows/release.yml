name: Release Windows

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-test-release:
    runs-on: windows-2025
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -S . -B build -A x64 -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Regression and runtime tests
        shell: pwsh
        run: |
          ctest --test-dir build -C Release --output-on-failure
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $process = Start-Process .\build\Release\PureView.exe -ArgumentList "--self-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          .\scripts\package.ps1 -BuildDirectory .\build\Release -OutputDirectory dist -Version $version

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          gh release create "${{ github.ref_name }}" `
            "dist/PureView-$version-Windows-x64.zip" `
            "dist/PureView-$version-Windows-x64.zip.sha256" `
            --title "PureView $version for Windows" `
            --generate-notes
